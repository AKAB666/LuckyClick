<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Click</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
color:#ffd700;
}

.card{
background:#222;
margin:15px;
padding:20px;
border-radius:20px;
}

button{
width:90%;
padding:15px;
margin:8px;
border-radius:15px;
border:0;
font-size:18px;
background:#ffd700;
}

.menu button{
background:#333;
color:white;
}

.hidden{
display:none;
}

.click{
width:180px;
height:180px;
border-radius:50%;
font-size:30px;
}

</style>

</head>

<body>


<h1>🍀 Lucky Click</h1>


<div class="card">
💰 Монеты:
<span id="coins">0</span>
<br>
⚡ Сила клика:
<span id="power">1</span>
</div>


<div id="home" class="card">

<button class="click" onclick="clickCoin()">
🖱️ КЛИК
</button>

<br>

<button onclick="upgrade()">
⚡ Улучшить клик
</button>

</div>



<div id="casino" class="card hidden">

<div id="casino" class="card hidden">

<h2>🎰 Казино</h2>

<h3>🎡 Рулетка</h3>

<input id="bet" type="number" placeholder="Сумма ставки">

<br>

<button onclick="chooseColor('red')">
🔴 Красное x2
</button>

<button onclick="chooseColor('black')">
⚫ Черное x2
</button>

<button onclick="chooseColor('green')">
🟢 Зеленое x14
</button>

<br>

<input id="number" type="number" min="0" max="36" placeholder="Число 0-36">

<br>

<button onclick="roulette()">
🎡 Крутить рулетку
</button>

<p id="rouletteResult"></p>


<button onclick="back()">
⬅️ Назад
</button>

</div>

<button onclick="back()">
⬅️ Назад
</button>

</div>



<div id="shop" class="card hidden">

<h2>🏪 Магазин</h2>

<p>
Скоро здесь будут улучшения и бустеры
</p>

<button onclick="back()">
⬅️ Назад
</button>

</div>



<div id="pets" class="card hidden">

<h2>🐾 Питомцы</h2>

<p>
Скоро появятся питомцы
</p>

<button onclick="back()">
⬅️ Назад
</button>

</div>



<div id="cases" class="card hidden">

<h2>🎁 Кейсы</h2>

<p>
Обычный — 5000 💰<br>
Редкий — 12000 💰<br>
Легендарный — 100000 💰
</p>

<button onclick="back()">
⬅️ Назад
</button>

</div>



<div id="profile" class="card hidden">

<h2>👤 Профиль</h2>

<p>
Игрок Lucky Click
</p>

<button onclick="back()">
⬅️ Назад
</button>

</div>



<div class="card menu">

<h2>Меню</h2>

<button onclick="openPage('casino')">
🎰 Казино
</button>

<button onclick="openPage('shop')">
🏪 Магазин
</button>

<button onclick="openPage('pets')">
🐾 Питомцы
</button>

<button onclick="openPage('cases')">
🎁 Кейсы
</button>

<button onclick="openPage('profile')">
👤 Профиль
</button>

</div>



<script>

let coins = Number(localStorage.getItem("coins")) || 0;

let power = Number(localStorage.getItem("power")) || 1;


function update(){

document.getElementById("coins").innerHTML=coins;

document.getElementById("power").innerHTML=power;

}


function clickCoin(){

coins+=power;

save();

update();

}


function upgrade(){

if(coins>=100){

coins-=100;

power++;

save();

update();

}else{

alert("Не хватает монет");

}

}



function save(){

localStorage.setItem("coins",coins);

localStorage.setItem("power",power);

}



function openPage(page){

document.querySelectorAll(".card").forEach(x=>{
x.classList.add("hidden");
});

document.getElementById(page).classList.remove("hidden");

}



function back(){

document.querySelectorAll(".card").forEach(x=>{
x.classList.remove("hidden");
});

}


update();

</script>


</body>
</html>
