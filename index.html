 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Click</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
    <h1>🍀 Lucky Click</h1>

    <div class="balance">
        💰 <span id="coins">0</span>
    </div>

    <div class="power">
        ⚡ Клик:
        <span id="clickPower">1</span>
    </div>
</header>

<section id="home" class="page active">

    <button id="clickButton">
        🪙
    </button>

    <button class="big" onclick="upgradeClick()">
        ⚡ Улучшить клик
    </button>

</section>

<section id="casino" class="page">

<h2>🎰 Казино</h2>

<button onclick="openGame('roulette')">
🎡 Рулетка
</button>

<button onclick="openGame('dice')">
🎲 Кубик
</button>

<button onclick="openGame('slot')">
🎰 Слот
</button>

<button onclick="openGame('ladder')">
📈 Лесенка
</button>

<button onclick="openGame('jackpot')">
💎 Джекпот
</button>

<button onclick="showPage('home')">
⬅ Назад
</button>

</section>
<section id="dice" class="page">

<h2>🎲 Кубик</h2>

<input id="diceBet" type="number" placeholder="Ставка">

<br><br>

<input id="diceNumber" type="number" min="1" max="6" placeholder="Число 1-6">

<br><br>

<button onclick="rollDice()">
🎲 Бросить кубик
</button>

<p id="diceResult"></p>

<button onclick="showPage('casino')">
⬅ Назад
</button>

</section>

<section id="shop" class="page">

<h2>🏪 Магазин</h2>

<div class="item">

<h3>⚡ Улучшение клика</h3>

<p>
Цена:
<span id="upgradePrice">100</span>
</p>

<button onclick="upgradeClick()">
Купить
</button>

</div>

<div class="item">

<h3>🤖 Автоклик</h3>

<p>
Цена:
5000
</p>

<button id="buyAuto">
Купить
</button>

</div>

<button onclick="showPage('home')">
⬅ Назад
</button>

</section>

<section id="pets" class="page">

<h2>🐾 Питомцы</h2>

<div id="petsList">

</div>

<button onclick="showPage('home')">
⬅ Назад
</button>

</section>

<section id="cases" class="page">

<h2>🎁 Кейсы</h2>

<button onclick="openCase('common')">
Обычный — 5000
</button>

<button onclick="openCase('rare')">
Редкий — 12000
</button>

<button onclick="openCase('legend')">
Легендарный — 100000
</button>

<div id="caseResult"></div>

<button onclick="showPage('home')">
⬅ Назад
</button>

</section>
